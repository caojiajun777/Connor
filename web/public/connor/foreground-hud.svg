  <path d="M720 120 H640 M720 120 V200" stroke="#2f9bff" stroke-opacity="0.45" stroke-width="1.5"/>
  <path d="M80 780 H160 M80 780 V700" stroke="#2f9bff" stroke-opacity="0.35" stroke-width="1.5"/>
  <path d="M720 780 H640 M720 780 V700" stroke="#2f9bff" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Scan ticks -->
